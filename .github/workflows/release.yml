name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          out=mailbot
          if [ "$GOOS" = "windows" ]; then out=mailbot.exe; fi
          go build -ldflags "-X main.version=${{ github.ref_name }}" -o "dist/$out" ./cmd/mailbot

      - name: Package archive
        run: |
          cd dist
          name="mailbot_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir "$name"
          cp ../.env.example "$name/"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            mv mailbot.exe "$name/"
            zip -r "$name.zip" "$name"
          else
            mv mailbot "$name/"
            tar -czf "$name.tar.gz" "$name"
          fi

      - name: Generate checksum
        run: |
          cd dist
          name="mailbot_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            sha256sum "$name.zip" > "$name.checksum.txt"
          else
            sha256sum "$name.tar.gz" > "$name.checksum.txt"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mailbot_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.checksum.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: |
          cd artifacts
          cat *.checksum.txt > checksums.txt
          rm -f *.checksum.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
